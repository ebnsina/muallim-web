<!doctype html>
<!--
	The last-resort error page. SvelteKit renders it when an error escapes the root
	layout's load, or is thrown inside `handle` — the two cases where no
	+error.svelte boundary exists to catch it.

	It must therefore depend on nothing: no app bundle, no external stylesheet, no
	font. Everything it needs is inline.
-->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>%sveltekit.status% — Something went wrong</title>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #fcfcfd;
				--fg: #1c1e21;
				--muted: #6b7280;
				--accent: #3b5bdb;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #16181d;
					--fg: #e8eaed;
					--muted: #9aa0a6;
					--accent: #8da2fb;
				}
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: grid;
				place-items: center;
				padding: 1.5rem;
				background: var(--bg);
				color: var(--fg);
				font:
					16px/1.6 system-ui,
					-apple-system,
					'Segoe UI',
					sans-serif;
			}
			main {
				max-width: 28rem;
				text-align: center;
			}
			.status {
				margin: 0;
				font-size: 0.875rem;
				font-weight: 500;
				letter-spacing: 0.05em;
				color: var(--muted);
				font-variant-numeric: tabular-nums;
			}
			h1 {
				margin: 0.5rem 0 0;
				font-size: 1.5rem;
				line-height: 1.3;
			}
			p.detail {
				color: var(--muted);
			}
			a {
				display: inline-block;
				margin-top: 1.5rem;
				padding: 0.7rem 1.1rem;
				border-radius: 0.5rem;
				background: var(--accent);
				color: #fff;
				font-size: 0.875rem;
				font-weight: 500;
				text-decoration: none;
			}
			a:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 2px;
			}
			@media (prefers-color-scheme: dark) {
				a {
					color: #16181d;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<p class="status">Error %sveltekit.status%</p>
			<h1>Something went wrong</h1>
			<p class="detail">%sveltekit.error.message%</p>
			<a href="/">Back to home</a>
		</main>
	</body>
</html>
